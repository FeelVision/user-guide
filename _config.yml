# FeelVision User Guide - GitHub Pages Configuration

# Site Settings
title: FeelVision User Guide
description: Comprehensive user guide for FeelVision smart glasses for visually impaired individuals
author: FeelVision Team
baseurl: "/user-guide"
url: "https://feelvision.github.io"

# Build Settings
markdown: kramdown
highlighter: rouge
permalink: pretty
timezone: UTC

# Plugins
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-toc

# Navigation
nav:
  - title: Home
    url: /
  - title: Getting Started
    url: /getting-started/
  - title: Hardware Setup
    url: /hardware-setup/
  - title: App Installation
    url: /app-installation/
  - title: Modes
    url: /modes/
  - title: Face Recognition
    url: /face-recognition/
  - title: Troubleshooting
    url: /troubleshooting/
  - title: FAQ
    url: /faq/

# Table of Contents Settings
toc:
  min_level: 2
  max_level: 4
  ordered_list: false

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - .gitignore
  - .sass-cache/

# Collections
collections:
  docs:
    output: true
    permalink: /docs/:path/

# Defaults
defaults:
  - scope:
      path: "pages"
      type: "pages"
    values:
      layout: "page"
      permalink: /:basename/
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

# Image Settings
image:
  path: /assets/images
  default: default.png

# Social Links (optional)
social:
  github: feelvision/feelvision
  twitter: feelvision
  email: support@feelvision.org

# Analytics (optional)
analytics:
  google:
    tracking_id: UA-XXXXXXXXX-X
